##### Solarized Light status bar #####
set -g status-style "bg=colour254,fg=colour241"

set -g status-left-style "fg=colour241,bg=colour254"
set -g status-right-style "fg=colour241,bg=colour254"

setw -g window-status-style "fg=colour241,bg=colour254"
setw -g window-status-current-style "fg=colour254,bg=colour33,bold"

set -g status-left  " #[fg=colour33,bold]#S #[fg=colour241]│ #W:#P "
set -g status-right "#[fg=#93a1a1]#[bg=#93a1a1,fg=#fdf6e3] %Y-%m-%d #[bg=#657b83,fg=#fdf6e3] %H:%M:%S #[bg=#268bd2,fg=#fdf6e3,bold] #H "
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "


# tmux Solarized Light Theme Configuration
# ==========================================
# Based on Ethan Schoonover's Solarized color palette
# https://ethanschoonover.com/solarized/

# Solarized Light Color Palette
# -----------------------------
# base3   #fdf6e3  (background)
# base2   #eee8d5  (background highlights)
# base1   #93a1a1  (optional emphasized content)
# base0   #839496  (body text / default code / primary content)
# base00  #657b83  (body text / default code / primary content)
# base01  #586e75  (optional emphasized content / comments)
# base02  #073642  
# base03  #002b36  
# yellow  #b58900
# orange  #cb4b16
# red     #dc322f
# magenta #d33682
# violet  #6c71c4
# blue    #268bd2
# cyan    #2aa198
# green   #859900


set-option -g default-command ""
#source /Users/takuya.kurihara/.pyenv/versions/3.6.2/lib/python3.6/site-packages
#set -g mouse on
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# 設定ファイルをリロードする
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# | でペインを縦に分割する
bind | split-window -h

# - でペインを横に分割する
bind - split-window -v

# ステータスバーを設定する
## 左パネルを設定する
set -g status-left-length 40
set -g status-left "#[fg=green]Session: #S #[fg=yellow]#I #[fg=cyan]#P"
## 右パネルを設定する
#set -g status-right "#[fg=cyan][%Y-%m-%d(%a) %H:%M]"
## リフレッシュの間隔を設定する(デフォルト 15秒)
set -g status-interval 1
## ウィンドウリストの位置を中心寄せにする
set -g status-justify centre
## ヴィジュアルノーティフィケーションを有効にする
setw -g monitor-activity on
set -g visual-activity on
## ステータスバーを上部に表示する
set -g status-position top

set -g status-right '#{battery_status_bg} Batt: #{battery_icon} #{battery_percentage} #{battery_remain} | %a %h-%d %H:%M '
#set -g @colors-solarized 'light'


set -g @layout_two_pane_left80 'b25e,200x55,0,0{80x55,0,0,0,119x55,81,0,1}'
bind-key A run-shell 'tmux select-layout "$(tmux show -gv @layout_two_pane_left80)"'

# peneの開始番号
set-option -g base-index 1

# ウィンドウ履歴の最大行数
set-option -g history-limit 5000

# コピーモードのキーバインドをvi風にする
set-window-option -g mode-keys vi

# ウィンドウのインデックスを1から始める
set -g base-index 1

